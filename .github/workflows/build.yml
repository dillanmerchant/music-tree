name: Build and Release

on:
  push:
    tags:
      - "v*" # Triggers on v1.0.0, v1.1.0, etc.

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies and generate Prisma client
        run: |
          npm ci
          npx prisma generate
        env:
          # Avoid GitHub API rate limits from youtube-dl-exec postinstall in CI;
          # the binary will be downloaded later at runtime on the user's machine.
          YOUTUBE_DL_SKIP_DOWNLOAD: "1"

      - name: Build and publish with electron-builder
        run: npm run build
        env:
          # electron-builder will use either of these for GitHub releases
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
